# Configuration Template for HateSpeech-LLM-Detector
# Copy this file to config.yaml and customize as needed

# Models to evaluate
models:
  - "microsoft/phi-2"
  - "mistralai/Mistral-7B-Instruct-v0.1"
  - "meta-llama/Llama-2-7b-chat-hf"
  - "Qwen/Qwen2-7B-Instruct"
  - "deepseek-ai/deepseek-llm-7b-chat"

# Dataset configuration
dataset:
  path: "examples/sample_dataset.json"  # Path to your dataset
  
# Output configuration
output:
  directory: "results"  # Directory to save results
  
# Hardware configuration
device: "auto"  # Options: "auto", "cuda", "cpu"

# Generation parameters
generation:
  temperature: 0.1  # Lower = more deterministic (0.0 to 1.0)
  max_new_tokens_binary: 150  # For binary classification
  max_new_tokens_extraction: 300  # For sentence extraction
  max_new_tokens_category: 200  # For categorization

# Evaluation settings
evaluation:
  save_detailed_results: true
  save_classification_report: true
  generate_confusion_matrix: true
